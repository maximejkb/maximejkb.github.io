<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maxojkb</title>

  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
  <link rel="shortcut icon" href="favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
  <link rel="manifest" href="favicon/site.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcfb;
      --ink: #1a1814;
      --ink-light: #9a9690;
      --rule: #e6e3dd;
      --sidebar-w: 160px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-w);
      height: 100vh;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      z-index: 100;
    }

    .sidebar-name {
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      display: block;
      margin-bottom: 28px;
    }

    .sidebar-section {
      margin-bottom: 16px;
    }

    .sidebar-section-label {
      display: block;
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      margin-bottom: 6px;
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-section-label.active { color: var(--ink); }
    a.sidebar-section-label:hover { color: var(--ink); }

    .sidebar-filters {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-left: 10px;
    }

    .filter-btn {
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      background: none;
      border: none;
      color: var(--ink-light);
      cursor: pointer;
      padding: 0;
      text-align: left;
      transition: color 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active { color: var(--ink); }

    .sidebar-ig {
      margin-top: auto;
      font-size: 15px;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-ig:hover { color: var(--ink); }

    /* ── MAIN ── */
    main {
      padding: 60px calc(var(--sidebar-w) + 60px) 0 60px;
    }

    .grid {
      display: block;
      max-width: 900px;
      margin: 0 auto;
    }

    .work-item {
      padding: 80px 0;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .work-image {
      overflow: hidden;
      background: #e8e4dc;
    }

    .work-image img {
      width: 100%;
      height: auto;
      object-fit: unset;
      display: block;
      transition: opacity 0.3s;
    }

    .work-item:hover .work-image img { opacity: 0.9; }

    .work-meta { margin-top: 14px; margin-bottom: 12px; }

    .work-title {
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
      text-decoration: underline;
      text-underline-offset: 3px;
      display: block;
      margin-bottom: 2px;
    }

    .work-info {
      font-size: 16px;
      color: var(--ink);
    }

    .work-actions { display: flex; gap: 8px; }

    .btn {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      padding: 5px 12px;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-block;
    }

    .btn:hover { background: var(--ink); color: var(--bg); }

    .btn-ghost {
      border-color: var(--rule);
      color: var(--ink-light);
      pointer-events: none;
      cursor: default;
    }

    .btn-ghost:hover {
      background: transparent;
      color: var(--ink-light);
    }

    [id^='shopify-mount-'] { display: none !important; }

    footer {
      padding: 40px 60px;
    }

    footer span {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: var(--ink-light);
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; right: 0;
        width: 100%;
        height: auto;
        flex-direction: column;
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .sidebar-name { margin-bottom: 10px; }

      .sidebar-section { margin-bottom: 0; }

      span.sidebar-section-label { display: none; }

      a.sidebar-section-label {
        display: block;
        position: absolute;
        top: 18px;
        right: 20px;
      }

      .sidebar-filters {
        flex-direction: row;
        gap: 20px;
        padding-left: 0;
      }

      .sidebar-ig { display: none; }

      main { padding: 100px 20px 0 20px; }

      .work-item { padding: 48px 0; }

      footer { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar-name">MAXOJKB</a>

    <div class="sidebar-section">
      <span class="sidebar-section-label active">WORK</span>
      <div class="sidebar-filters">
        <button class="filter-btn active" data-filter="painting">Paintings</button>
        <button class="filter-btn" data-filter="sketches">Sketches</button>
      </div>
    </div>

    <div class="sidebar-section">
      <a href="cv.html" class="sidebar-section-label">INFO</a>
    </div>

    <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener" class="sidebar-ig">@maxojkb</a>
  </aside>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <span>© 2026</span>
  </footer>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="config.js"></script>
  <script>
    const grid = document.getElementById("grid");

    WORKS.forEach((work, i) => {
      const inquireSubject = 'Inquiry: ' + work.title;
      const inquireBody =
        'Hi Maxime,\n\n' +
        'I\'m interested in purchasing the original work:\n\n' +
        '  ' + work.title + '\n' +
        '  ' + work.medium + ', ' + work.dimensions + '\n\n' +
        'Could you let me know if it\'s still available and the asking price?\n\n' +
        'Thank you,\n[Your name]';

      const hasShopifyId = work.shopifyProductId && work.shopifyProductId.trim() !== '';

      const buyPrintBtn = hasShopifyId
        ? '<a href="https://maxojkb.myshopify.com/products/' + work.shopifyProductId + '" class="btn" target="_blank" rel="noopener noreferrer">Buy Print</a>'
        : '<span class="btn btn-ghost">Buy Print</span>';

      const inquireBtn = work.originalAvailable
        ? '<a href="mailto:maxojkb@proton.me?subject=' + encodeURIComponent(inquireSubject) + '&body=' + encodeURIComponent(inquireBody) + '" class="btn">Own the Original</a>'
        : '<span class="btn btn-ghost">Inquire</span>';

      const item = document.createElement("div");
      item.className = "work-item";
      item.dataset.category = work.category || "painting";
      item.style.animationDelay = `${0.04 + i * 0.05}s`;
      item.innerHTML =
        '<div class="work-image">' +
          '<img src="' + work.image + '" alt="' + work.title + '" loading="lazy" />' +
        '</div>' +
        '<div class="work-meta">' +
          '<span class="work-title">' + work.title + '</span>' +
          '<span class="work-info">' + work.medium + ', ' + work.dimensions + '</span>' +
        '</div>' +
        '<div class="work-actions">' +
          buyPrintBtn +
          inquireBtn +
        '</div>';

      // hide non-paintings on initial load
      if ((work.category || 'painting') !== 'painting') {
        item.style.display = 'none';
      }

      grid.appendChild(item);
    });

    // ── Filter logic ──────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        document.querySelectorAll('.work-item').forEach(item => {
          item.style.display = item.dataset.category === filter ? '' : 'none';
        });
      });
    });
  </script>

</body>
</html>
