<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maxojkb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcfb;
      --ink: #1a1814;
      --ink-light: #9a9690;
      --rule: #e6e3dd;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      background: var(--bg);
    }

    .nav-logo {
      font-size: 16px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-info {
      font-size: 16px;
      text-decoration: none;
      color: var(--ink-light);
      transition: color 0.15s;
    }

    .nav-info:hover { color: var(--ink); }

    main { padding-top: 72px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .work-item {
      padding: 40px;
      border-bottom: 1px solid var(--rule);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    .work-item:nth-child(odd) { border-right: 1px solid var(--rule); }

    @keyframes fadeIn { to { opacity: 1; } }

    .work-image {
      width: 100%;
      aspect-ratio: 4/5;
      overflow: hidden;
      background: #edeae4;
      margin-bottom: 14px;
    }

    .work-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .work-item:hover .work-image img { opacity: 0.9; }

    .work-meta { margin-bottom: 12px; }

    .work-title {
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
      text-decoration: underline;
      text-underline-offset: 3px;
      display: block;
      margin-bottom: 2px;
    }

    .work-info {
      font-size: 16px;
      color: var(--ink);
    }

    .work-actions { display: flex; gap: 8px; }

    .btn {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      padding: 5px 12px;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-block;
    }

    .btn:hover { background: var(--ink); color: var(--bg); }

    .btn-ghost {
      border-color: var(--rule);
      color: var(--ink-light);
      pointer-events: none;
      cursor: default;
    }

    .btn-ghost:hover {
      background: transparent;
      color: var(--ink-light);
    }

    /* Hide Shopify's rendered components entirely — we use our own buttons */
    [id^='shopify-mount-'] { display: none !important; }

    footer {
      border-top: 1px solid var(--rule);
      padding: 22px 40px;
      display: flex;
      justify-content: space-between;
    }

    footer span, footer a {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: var(--ink-light);
      text-decoration: none;
    }

    footer a:hover { color: var(--ink); }

    @media (max-width: 680px) {
      nav { padding: 18px 20px; }
      .grid { grid-template-columns: 1fr; }
      .work-item { padding: 28px 20px; border-right: none !important; }
      footer { padding: 20px; flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener" class="nav-logo">@maxojkb</a>
    <a href="cv.html" class="nav-info">INFO</a>
  </nav>

  <main>
    <div class="grid" id="grid"></div>

        'Thank you,\n[Your name]';

      const inquireBtn = work.originalAvailable
        ? '<a href="mailto:maxojkb@proton.me?subject=' + encodeURIComponent(inquireSubject) + '&body=' + encodeURIComponent(inquireBody) + '" class="btn">Inquire</a>'
        : '<span class="btn btn-ghost">Inquire</span>';

      const item = document.createElement("div");
      item.className = "work-item";
      item.style.animationDelay = `${0.04 + i * 0.05}s`;
      item.innerHTML = `
        <div class="work-image">
          <img src="${work.image}" alt="${work.title}" loading="lazy" />
        </div>
        <div class="work-meta">
          <span class="work-title">${work.title}</span>
          <span class="work-info">${work.medium}, ${work.dimensions}</span>
        </div>
        <div class="work-actions">
          ${inquireBtn}
        </div>
        <div id="${mountId}"></div>
      `;
      grid.appendChild(item);
    });
