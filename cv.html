<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maxojkb — info</title>

  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
  <link rel="shortcut icon" href="favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
  <link rel="manifest" href="favicon/site.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcfb;
      --ink: #1a1814;
      --ink-light: #9a9690;
      --rule: #e6e3dd;
      --sidebar-w: 160px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Times New Roman', Times, serif;
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-w);
      height: 100vh;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      z-index: 100;
    }

    .sidebar-name {
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      display: block;
      margin-bottom: 28px;
    }

    .sidebar-section {
      margin-bottom: 16px;
    }

    .sidebar-section-label {
      display: block;
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-section-label.active { color: var(--ink); }
    a.sidebar-section-label:hover { color: var(--ink); }

    .sidebar-ig {
      margin-top: auto;
      font-size: 15px;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-ig:hover { color: var(--ink); }

    /* ── MAIN ── */
    main {
      padding: 60px calc(var(--sidebar-w) + 60px) 80px 60px;
    }

    .cv-content {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .cv-header {
      margin-bottom: 32px;
    }

    .cv-header .cv-name {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .cv-header .cv-born {
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .cv-header a {
      display: block;
      color: var(--ink);
      text-decoration: none;
      font-size: 17px;
      line-height: 1.65;
    }

    .cv-header a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── SECTIONS ── */
    .cv-section {
      margin-bottom: 32px;
    }

    .cv-section h2 {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 6px;
    }

    .cv-entry {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0 12px;
      margin-bottom: 4px;
      font-size: 17px;
      line-height: 1.65;
    }

    .cv-year {
      color: var(--ink-light);
      font-size: 16px;
      padding-top: 1px;
    }

    .cv-entry a {
      color: var(--ink);
      text-decoration: none;
    }

    .cv-entry a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .cv-statement {
      font-size: 17px;
      line-height: 1.75;
      color: var(--ink);
      max-width: 560px;
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; right: 0;
        width: 100%;
        height: auto;
        flex-direction: row;
        align-items: center;
        padding: 18px 20px;
        border-bottom: 1px solid var(--rule);
        gap: 20px;
      }

      .sidebar-name { margin-bottom: 0; }
      .sidebar-section { margin-bottom: 0; }
      .sidebar-ig { display: none; margin-top: 0; }

      main { padding: 80px 20px 60px; }
      .cv-entry { grid-template-columns: 44px 1fr; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar-name">MAXOJKB</a>

    <div class="sidebar-section">
      <a href="index.html" class="sidebar-section-label">WORK</a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-section-label active">INFO</span>
    </div>

    <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener" class="sidebar-ig">@maxojkb</a>
  </aside>

  <main>
    <div class="cv-content" id="cv-main"></div>
  </main>

  <script src="cv-config.js"></script>
  <script>
    const main = document.getElementById('cv-main');

    // Header
    main.innerHTML =
      '<div class="cv-header">' +
        '<p class="cv-name">' + CV.name + '</p>' +
        '<p class="cv-born">b. ' + CV.born + ', ' + CV.location + '</p>' +
        '<a href="mailto:' + CV.email + '">' + CV.email + '</a>' +
      '</div>' +
      (CV.statement ? '<div class="cv-section"><p class="cv-statement">' + CV.statement + '</p></div>' : '');

    // CV sections in display order
    const sections = [
      { key: 'soloExhibitions',      label: 'Solo Exhibitions' },
      { key: 'groupExhibitions',     label: 'Group Exhibitions' },
      { key: 'awardsAndResidencies', label: 'Awards & Residencies' },
      { key: 'press',                label: 'Press' },
      { key: 'education',            label: 'Education' },
    ];

    sections.forEach(function(section) {
      const entries = CV[section.key] || [];
      if (!entries.length) return;
      const entriesHTML = entries.map(function(e) {
        return '<div class="cv-entry">' +
          '<span class="cv-year">' + e.year + '</span>' +
          '<span>' + e.text + '</span>' +
        '</div>';
      }).join('');

      main.innerHTML +=
        '<div class="cv-section">' +
          '<h2>' + section.label + '</h2>' +
          entriesHTML +
        '</div>';
    });
  </script>

</body>
</html>
