<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maxojkb — info</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcfb;
      --ink: #1a1814;
      --ink-light: #4e4d4c;
      --rule: #e6e3dd;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
    }

    .nav-logo {
      font-size: 16px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-work {
      font-size: 16px;
      text-decoration: none;
      color: var(--ink-light);
      transition: color 0.15s;
    }

    .nav-work:hover { color: var(--ink); }

    /* ── CARD STAGE ── */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .card-wrap {
      width: 340px;
      height: 200px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-wrap:hover .card {
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--rule);
      background: var(--bg);
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-back .card-back-header {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 12px;
      padding-left: 0px; /* aligns with contact row values (20px label + 12px gap) */
    }

    /* ── FRONT ── */
    .card-front .name {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .card-front .detail {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.7;
    }

    /* ── BACK ── */
    .card-back .contact-row {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 0 12px;
      margin-bottom: 8px;
      align-items: baseline;
      font-size: 14px;
      line-height: 1.6;
    }

    .card-back .contact-row:last-child { margin-bottom: 0; }

    .card-back .label {
      color: var(--ink-light);
      font-size: 13px;
    }

    .card-back a {
      color: var(--ink);
      text-decoration: none;
    }

    .card-back a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── HINT ── */
    .hint {
      text-align: center;
      padding-bottom: 32px;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fadeHint 0.5s ease 0.8s forwards;
    }

    @keyframes fadeHint {
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      nav { padding: 20px; }
      .card-wrap { width: 300px; height: 180px; }
      .card-front, .card-back { padding: 28px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener" class="nav-logo">@maxojkb</a>
    <a href="index.html" class="nav-work">WORK</a>
  </nav>

  <div class="stage">
    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">

        <div class="card-front">
          <p class="name">MAX[O] J. K*****-B******</p>
          <p class="detail">
            b. 1999, New York, NY<br>
            d. ____, New York, NY
          </p>
        </div>

        <div class="card-back">
          <!-- <div class="contact-row">
            <span class="label">Bio</span>
            NYC-based writer, painter, photographer.
          </div> -->
          <p class="card-back-header">Brooklyn-based writer, painter, photographer. </p>
          <div class="contact-row">
            <span class="label">E</span>
            <a href="mailto:maxojkb@proton.me">maxojkb@proton.me</a>
          </div>
          <div class="contact-row">
            <span class="label">W</span>
            <a href="https://maxojkb.com" target="_blank" rel="noopener">maxojkb.com</a>
          </div>
          <div class="contact-row">
            <span class="label">IG</span>
            <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener">@maxojkb</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <p class="hint">Click to flip.</p>

  <script>
    const wrap = document.getElementById('cardWrap');
    const card = document.getElementById('card');
    const hint = document.querySelector('.hint');

    wrap.addEventListener('click', () => {
      card.classList.toggle('flipped');
      hint.style.opacity = '0';
    });
  </script>

</body>
</html>
