<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maxojkb — info</title>

  <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
  <link rel="shortcut icon" href="favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
  <link rel="manifest" href="favicon/site.webmanifest" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcfb;
      --ink: #1a1814;
      --ink-light: #9a9690;
      --rule: #e6e3dd;
      --sidebar-w: 160px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-w);
      height: 100vh;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      z-index: 100;
    }

    .sidebar-name {
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      display: block;
      margin-bottom: 28px;
    }

    .sidebar-section {
      margin-bottom: 16px;
    }

    .sidebar-section-label {
      display: block;
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      margin-bottom: 6px;
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-section-label.active { color: var(--ink); }
    a.sidebar-section-label:hover { color: var(--ink); }

    .sidebar-ig {
      margin-top: auto;
      font-size: 15px;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-ig:hover { color: var(--ink); }

    /* ── CONTENT ── */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px calc(var(--sidebar-w) + 40px) 40px 40px;
    }

    .card-wrap {
      width: 340px;
      height: 200px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-wrap:hover .card {
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--rule);
      background: var(--bg);
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-front .name {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .card-front .detail {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.7;
    }

    .card-back .contact-row {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 0 12px;
      margin-bottom: 8px;
      align-items: baseline;
      font-size: 14px;
      line-height: 1.6;
    }

    .card-back .contact-row:last-child { margin-bottom: 0; }

    .card-back .label {
      color: var(--ink-light);
      font-size: 13px;
    }

    .card-back a {
      color: var(--ink);
      text-decoration: none;
    }

    .card-back a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hint {
      text-align: center;
      padding: 0 calc(var(--sidebar-w) + 40px) 32px 40px;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fadeHint 0.5s ease 0.8s forwards;
    }

    @keyframes fadeHint { to { opacity: 1; } }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; right: 0;
        width: 100%;
        height: auto;
        flex-direction: column;
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .sidebar-name { margin-bottom: 10px; }

      .sidebar-section { margin-bottom: 0; }

      a.sidebar-section-label {
        display: block;
        position: absolute;
        top: 18px;
        right: 20px;
      }

      .sidebar-ig { display: none; }

      .stage { padding: 100px 20px 40px; }

      .hint { padding: 0 20px 32px; }

      .card-wrap { width: 300px; height: 180px; }
      .card-front, .card-back { padding: 28px; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar-name">MAXOJKB</a>

    <div class="sidebar-section">
      <a href="index.html" class="sidebar-section-label">WORK</a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-section-label active">INFO</span>
    </div>

    <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener" class="sidebar-ig">@maxojkb</a>
  </aside>

  <div class="stage">
    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">

        <div class="card-front">
          <p class="name">MAX[O] J. K*****-B******</p>
          <p class="detail">
            b. 1999, New York, NY<br>
          </p>
        </div>

        <div class="card-back">
          <div class="contact-row">
            <span class="label">E</span>
            <a href="mailto:maxojkb@proton.me">maxojkb@proton.me</a>
          </div>
          <div class="contact-row">
            <span class="label">W</span>
            <a href="https://maxojkb.com" target="_blank" rel="noopener">maxojkb.com</a>
          </div>
          <div class="contact-row">
            <span class="label">IG</span>
            <a href="https://www.instagram.com/maxojkb" target="_blank" rel="noopener">@maxojkb</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <p class="hint">Click card to flip.</p>

  <script>
    const wrap = document.getElementById('cardWrap');
    const card = document.getElementById('card');
    const hint = document.querySelector('.hint');

    wrap.addEventListener('click', () => {
      card.classList.toggle('flipped');
      hint.style.opacity = '0';
    });
  </script>

</body>
</html>
